services:
  postgres_db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  user-details-manager-api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres_db;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    depends_on:
      - postgres_db
      - flyway-migrator

  flyway-migrator:
    image: flyway/flyway
    command: -url=jdbc:postgresql://postgres_db:5432/${POSTGRES_DB} -user=${POSTGRES_USER} -password=${POSTGRES_PASSWORD} -connectRetries=60 -schemas=user_details_manager -cleanDisabled=false clean migrate
    volumes:
      - ./db/migrations:/flyway/sql
    depends_on:
      - postgres_db

volumes:
  postgres_data:
