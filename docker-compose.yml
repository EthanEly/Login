services:
  user-postgres-db:
    image: postgres:16
    env_file: .env
    environment:
      - POSTGRES_USER=${USER_POSTGRES_USER}
      - POSTGRES_PASSWORD=${USER_POSTGRES_PASSWORD}
      - POSTGRES_DB=${USER_POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - user_postgres_data:/var/lib/postgresql/data

  user-flyway-migrator:
    image: flyway/flyway
    env_file: .env
    command: -url=jdbc:postgresql://user-postgres-db:5432/${USER_POSTGRES_DB} -user=${USER_POSTGRES_USER} -password=${USER_POSTGRES_PASSWORD} -connectRetries=60 -cleanDisabled=false clean migrate
    volumes:
      - ./services/user-details-manager/api/db/migrations:/flyway/sql
    depends_on:
      - user-postgres-db

  user-details-manager:
    build:
      context: ./services/user-details-manager/api
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=user-postgres-db;Database=${USER_POSTGRES_DB};Username=${USER_POSTGRES_USER};Password=${USER_POSTGRES_PASSWORD}
    depends_on:
      - user-postgres-db
      - user-flyway-migrator

  auth-postgres-db:
    image: postgres:16
    env_file: .env
    environment:
      - POSTGRES_USER=${AUTH_POSTGRES_USER}
      - POSTGRES_PASSWORD=${AUTH_POSTGRES_PASSWORD}
      - POSTGRES_DB=${AUTH_POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data

  auth-flyway-migrator:
    image: flyway/flyway
    env_file: .env
    command: -url=jdbc:postgresql://auth-postgres-db:5432/${AUTH_POSTGRES_DB} -user=${AUTH_POSTGRES_USER} -password=${AUTH_POSTGRES_PASSWORD} -connectRetries=60 -cleanDisabled=false clean migrate
    volumes:
      - ./services/authentication-service/api/db/migrations:/flyway/sql
    depends_on:
      - auth-postgres-db

  authentication-service:
    build:
      context: ./services/authentication-service/api
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - "8081:8081"
    environment:
      - ConnectionStrings__DefaultConnection=Host=auth-postgres-db;Database=${AUTH_POSTGRES_DB};Username=${AUTH_POSTGRES_USER};Password=${AUTH_POSTGRES_PASSWORD}
      - ASPNETCORE_HTTP_PORTS=8081
    depends_on:
      - auth-postgres-db
      - auth-flyway-migrator

volumes:
  user_postgres_data:
  auth_postgres_data:
